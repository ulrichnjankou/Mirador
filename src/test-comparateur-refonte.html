<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRADOR - Comparateur Refonte (Test)</title>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';
        import { ComparateurRefonte } from './components/ComparateurRefonte.tsx';

        const TestApp = () => {
            return React.createElement(ComparateurRefonte, {
                onComplete: (subscriptionId) => {
                    console.log('Souscription complétée:', subscriptionId);
                    alert(`✅ Souscription réussie ! N° de contrat : ${subscriptionId}`);
                }
            });
        };

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(TestApp));
    </script>
</body>
</html>
